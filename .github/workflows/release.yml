name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '版本号 tag,例如 v0.1.0'
        required: true

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install frontend deps
        working-directory: app
        run: npm ci

      - name: Build app + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "What's LLM ${{ github.event.inputs.tag || github.ref_name }}"
          releaseDraft: true
          prerelease: false
          releaseBody: |
            Windows 桌面版(.msi / .exe)。便携版:解压后在 exe 同级建一个空的 data/ 文件夹,进度随文件夹走。
            本版未内置语义检索模型,检索退回关键词搜索;其余功能完整。
